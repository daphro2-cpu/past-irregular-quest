<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fly Swatter</title><link rel="stylesheet" href="style.css"></head><body onload="start('fly')"><div class="page"><section class="hero"><h1>Fly Swatter</h1><p>Retro pixel practice. Wrong answer? Try again. After two mistakes, the answer appears so students can move on.</p><div class="badges"><div class="badge">TIMER</div><div class="badge">TRY AGAIN</div><div class="badge">REPLAYABLE</div></div></section><section class="game"><div class="top"><h2>Fly Swatter</h2><div class="stats"><div class="stat">Score: <span id="score">0</span></div><div class="stat">Q: <span id="qnum">1</span>/<span id="total">10</span></div></div></div><div class="body"><div class="bar"><div class="fill" id="fill"></div></div><div class="inst" id="inst"></div><div class="q" id="q"></div><div class="choices" id="choices"></div><div class="build" id="build"><div class="slots" id="slots"></div><div class="letters" id="letters"></div><div class="controls"><button class="btn" onclick="undo()">Undo Last Letter</button><button class="btn" onclick="clearLetters()">Clear All</button><button class="btn" onclick="checkBuild()">Check</button></div></div><div class="feedback" id="fb"></div><div class="controls"><button class="btn" onclick="back()">Back to Map</button><button class="btn" id="next" onclick="nextQ()" disabled>Next</button></div></div></section></div><script src="verbs.js"></script><script src="game.js"></script></body></html>
